<!DOCTYPE html>
<html>
<head>
    <title>SCADA Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: center;
        }

        th {
            background: #111;
            color: white;
        }

        #status {
            margin: 10px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>⚡ SCADA LIVE DASHBOARD</h2>

<div id="status">Loading...</div>

<table id="table"></table>

<script>

// ⭐ GitHub RAW CSV LINK (IMPORTANT)
const CSV_URL =
"https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data/ALL_SITES.csv";

function loadCSV() {

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: function(results) {

            let data = results.data;

            if (!data.length) return;

            document.getElementById("status").innerText =
                "Updated: " + new Date().toLocaleString();

            let html = "<tr>";

            Object.keys(data[0]).forEach(h => {
                html += "<th>" + h + "</th>";
            });

            html += "</tr>";

            data.forEach(r => {
                html += "<tr>";
                Object.values(r).forEach(v => {
                    html += "<td>" + (v ?? "") + "</td>";
                });
                html += "</tr>";
            });

            document.getElementById("table").innerHTML = html;
        }
    });
}

loadCSV();
setInterval(loadCSV, 30000);

</script>

</body>
</html>
