<!DOCTYPE html>
<html>
<head>
    <title>Inverter Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .top {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .inv {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>⚡ Pyramid Phase 2</h1>

<div class="top">
    <div class="card">
        <h2>Total KW</h2>
        <p id="totalW">0</p>
    </div>

    <div class="card">
        <h2>Total Day Gen</h2>
        <p id="totalDkwh">0</p>
    </div>
</div>

<div class="grid" id="inverters"></div>

<script>
function processData(data) {
    let latest = {};

    data.forEach(d => {
        let inv = d.DeviceName;
        if (!latest[inv] || d.Timestamp > latest[inv].Timestamp) {
            latest[inv] = d;
        }
    });

    let totalW = 0;
    let totalDkwh = 0;

    let container = document.getElementById("inverters");
    container.innerHTML = "";

    Object.values(latest).forEach(d => {
        let w = parseFloat(d.w) || 0;
        let dkwh = parseFloat(d.dkwh) || 0;

        totalW += w / 100;
        totalDkwh += dkwh;

        let div = document.createElement("div");
        div.className = "inv";

        // 🔥 TABLE बनवत आहोत
        let table = `<table border="1" style="width:100%; font-size:12px">
            <tr><th colspan="2">${d.DeviceName}</th></tr>
            <tr><td>⚡ KW</td><td>${w.toFixed(2)}</td></tr>
            <tr><td>🔋 dkwh</td><td>${dkwh.toFixed(2)}</td></tr>
            <tr><td>win</td><td>${d.win}</td></tr>
            <tr><td>tkwh</td><td>${d.tkwh}</td></tr>
        `;

        // 🔥 s1 to s24 loop
        for (let i = 1; i <= 24; i++) {
            let key = "s" + i;
            if (d[key] !== undefined) {
                table += `<tr><td>${key}</td><td>${d[key]}</td></tr>`;
            }
        }

        table += "</table>";

        div.innerHTML = table;
        container.appendChild(div);
    });

    document.getElementById("totalW").innerText = totalW.toFixed(2);
    document.getElementById("totalDkwh").innerText = totalDkwh.toFixed(2);
}
</script>

</body>
</html>
