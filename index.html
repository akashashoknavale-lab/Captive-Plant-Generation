<!DOCTYPE html>
<html>
<head>
    <title>Inverter Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .top {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .inv {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>⚡ Pyramid Phase 2</h1>

<div class="top">
    <div class="card">
        <h2>Total KW</h2>
        <p id="totalW">0</p>
    </div>

    <div class="card">
        <h2>Total Day Gen</h2>
        <p id="totalDkwh">0</p>
    </div>
</div>

<div class="grid" id="inverters"></div>

<script>
const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTcBrJaxl83YOmurro5F9b7KxU3n471rFtPF4d9xWBsMqG1Z9OGJPWJhncv7dqMCfAWTEtYOHVEuAI42iaThCc4TS3Tbuq5tGfG2lkAa5XKVELLb3vcoN8zo5DN0IIGmAsF6sIVzQTlR7OOL9wIgEHotGZWjBgicE7Ilcf0-nZF-bMDhfhsy25lPwdpFYJkgrA6nuBnDRxwk4OZiGWond7o9vYDrTNogGV_H6yGZU9mP92z0GoxnlFNF12P0xPlUgZsBDxZTMIkzE5PSBiDhm_nZsg7OQ&lib=M-RzSCphjG_2CuoD0BzClFyT8B5DgJEAP";

async function loadData() {
    let res = await fetch(API_URL);
    let data = await res.text();

    // CSV parse
    let rows = data.trim().split("\n");
    let headers = rows[0].split(",");

    let json = rows.slice(1).map(row => {
        let values = row.split(",");
        let obj = {};
        headers.forEach((h, i) => obj[h.trim()] = values[i]);
        return obj;
    });

    processData(json);
}

function processData(data) {
    let latest = {};

    data.forEach(d => {
        let inv = d.DeviceName;
        if (!latest[inv] || d.Timestamp > latest[inv].Timestamp) {
            latest[inv] = d;
        }
    });

    let totalW = 0;
    let totalDkwh = 0;

    let container = document.getElementById("inverters");
    container.innerHTML = "";

    Object.values(latest).forEach(d => {
        let w = parseFloat(d.w) || 0;
        let dkwh = parseFloat(d.dkwh) || 0;

        totalW += w;
        totalDkwh += dkwh;

        let div = document.createElement("div");
        div.className = "inv";

        div.innerHTML = `
            <h3>${d.DeviceName}</h3>
            <p>⚡ KW: ${w.toFixed(2)}</p>
            <p>🔋 Inv Day Gen: ${dkwh.toFixed(2)}</p>
        `;

        container.appendChild(div);
    });

    document.getElementById("totalW").innerText = totalW.toFixed(2);
    document.getElementById("totalDkwh").innerText = totalDkwh.toFixed(2);
}

// Auto refresh every 60 sec
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
