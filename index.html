<!DOCTYPE html>
<html>
<head>
    <title>Malangdev Remote Monitoring</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
        }

        .top {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 30px;
            width: 200px;
            text-align: center;
            font-size: 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 150px);
            justify-content: center;
            gap: 20px;
        }

        .inv {
            background: #1e293b;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
        }

        .inv:hover {
            transform: scale(1.05);
            transition: 0.2s;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 20px;
        }

        td, th {
            border: 1px solid #334155;
            padding: 6px;
            text-align: center;
            font-size: 16px;
        }

        th {
            background: #020617;
            font-size: 20px;
        }

        /* MODAL */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        #modalBox {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-height: 90%;
            overflow: auto;
        }

        button {
            float: right;
            padding: 6px 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

    </style>
</head>

<body>

<h1>⚡ Malangdev sites Pyramid Technoplast phase 1 and 2, Swati, Bhageria</h1>

<div class="top">
    <div class="card">
        <h2>Total KW</h2>
        <p id="totalW">0</p>
    </div>

    <div class="card">
        <h2>Total Day Gen</h2>
        <p id="totalDkwh">0</p>
    </div>
</div>

<div class="grid" id="inverters"></div>

<!-- MODAL -->
<div id="modal">
    <div id="modalBox">
        <button onclick="closeModal()">❌ Close</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>

const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTcBrJaxl83YOmurro5F9b7KxU3n471rFtPF4d9xWBsMqG1Z9OGJPWJhncv7dqMCfAWTEtYOHVEuAI42iaThCc4TS3Tbuq5tGfG2lkAa5XKVELLb3vcoN8zo5DN0IIGmAsF6sIVzQTlR7OOL9wIgEHotGZWjBgicE7Ilcf0-nZF-bMDhfhsy25lPwdpFYJkgrA6nuBnDRxwk4OZiGWond7o9vYDrTNogGV_H6yGZU9mP92z0GoxnlFNF12P0xPlUgZsBDxZTMIkzE5PSBiDhm_nZsg7OQ&lib=M-RzSCphjG_2CuoD0BzClFyT8B5DgJEAP";

async function loadData() {
    let res = await fetch(API_URL);
    let data = await res.text();

    let rows = data.trim().split("\n");
    let headers = rows[0].split(",");

    let json = rows.slice(1).map(row => {
        let values = row.split(",");
        let obj = {};
        headers.forEach((h, i) => obj[h.trim()] = values[i]);
        return obj;
    });

    processData(json);
}

function processData(data) {

    let latest = {};

    data.forEach(d => {
        let inv = d.DeviceName;
        if (!latest[inv] || d.Timestamp > latest[inv].Timestamp) {
            latest[inv] = d;
        }
    });

    let totalW = 0;
    let totalDkwh = 0;

    let container = document.getElementById("inverters");
    container.innerHTML = "";

    Object.values(latest).forEach(d => {

        let w = parseFloat(d.w) || 0;
        let dkwh = parseFloat(d.dkwh) || 0;

        totalW += w /1000;
        totalDkwh += dkwh;

        let table = `
        <table>
            <tr><th colspan="2">${d.DeviceName}</th></tr>
            <tr><td>AC(KW)</td><td>${(w/1000).toFixed(2)}</td></tr>
            <tr><td>Day Gen</td><td>${dkwh.toFixed(2)}</td></tr>
            <tr><td>DC(KW)</td><td>${d.win/1000 || "-"}</td></tr>
            <tr><td>Total Gen</td><td>${d.tkwh || "-"}</td></tr>
        `;

        for (let i = 1; i <= 24; i++) {
            let S = "s" + i;
        
            if (d[S] !== undefined) {
                let val = d[S];
        
                // 0 → "-"
                if (val == 0 || val === "0" || val === "" || val === null) {
                    val = "-";
                }
        
                // 🔥 label change
                let label = "String " + i;
        
                table += `<tr><td>${label}</td><td>${val}</td></tr>`;
            }
        }

        table += "</table>";

        let div = document.createElement("div");
        div.className = "inv";

        div.innerHTML = `
            <h3>${d.DeviceName}</h3>
            <p>⚡ ${(w/1000).toFixed(2)} KW</p>
            <p>🔋 ${dkwh.toFixed(2)}</p>
        `;

        // CLICK → OPEN MODAL
        div.onclick = () => openModal(table);

        container.appendChild(div);
    });

    document.getElementById("totalW").innerText = totalW.toFixed(2);
    document.getElementById("totalDkwh").innerText = totalDkwh.toFixed(2);
}

// MODAL FUNCTIONS
function openModal(content) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalContent").innerHTML = content;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// refresh every 6 sec
loadData();
setInterval(loadData, 6000);

</script>

</body>
</html>
